<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fontdiner+Swanky&display=swap"
      rel="stylesheet"
    />
    <link href="./src/output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body
    class="flex flex-col justify-center items-center min-h-screen bg-[#87c38f]"
  >
    <div
      id="frontDiv"
      class="h-96 w-60 flex items-center justify-center rounded-2xl bg bg-[#226f54]"
    >
      <form
        action=""
        method="get"
        class="justify-center items-center flex-col w-full gap-4 flex font-sans"
        id="frontForm"
      >
        <input
          type="email"
          name="userEmail"
          placeholder="Enter your Email"
          class="bg-white p-3 py-1 rounded w-[70%]"
          required
        />
        <input
          type="text"
          name="userName"
          placeholder="Enter your Name"
          class="bg-white p-3 py-1 rounded w-[70%]"
          required
        />
        <input
          type="submit"
          name=""
          value="submit"
          class="bg-[#dcdada] rounded px-1"
        />
      </form>
    </div>
    <div
      id="mainDiv"
      class="w-full hidden flex-col justify-start items-start min-h-screen"
    >
      <header class="w-full flex items-center justify-center h-12 bg-[#396751] sticky top-0">
        <div
          class="w-[80%] flex flex-col items-start justify-center text-white h-full"
        >
          <p id="emailPara">your Email is :</p>
          <p id="namePara">your name is :</p>
        </div>
        <div
          class="h-12 w-12 flex justify-center items-center bg-[#3e4838] text-2xl text-[#bedaa5] hover:text-[#87c38f] relative"
        >
        <div id="cartCircle" class=" hidden h-3 w-3 border-solid border rounded-full right-2 bottom-2  bg-white border-black  absolute z-10  justify-center items-center text-[10px] text-black font-bold "> </div>
          <i class="fa-solid fa-cart-shopping"></i>
        </div>
      </header>
      <div class="w-full h-12 flex justify-center items-center gap-4 font-sans">
        <input
          type="text"
          name="fruit name"
          placeholder="Search here"
          class="bg-white text-[10px] w-[50%] p-3 rounded"
          id="SearchBar"
        />
        <input
          type="submit"
          name="search"
          value="search"
          class="bg-[#e3e2e2] rounded p-3 text-[10px]"
          id="searchBtn"
        />
      </div>
      <div
        id="bodyDiv"
        class="w-[80%] mx-auto mt-10 justify-center gap-12 flex-wrap items-center flex font-sans"
      >
      
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
